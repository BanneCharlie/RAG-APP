# ===================================================================
# Development Profile — H2 in-memory, verbose logging
# ===================================================================
spring:
  datasource:
    url: jdbc:h2:mem:ai_project_dev
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # SQL init — creates MyBatis-Plus tables for H2 dev
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

logging:
  level:
    com.ai.project: DEBUG
    org.springframework.ai: DEBUG
