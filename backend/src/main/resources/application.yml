# ===================================================================
# AI Project Backend — Main Configuration
# Spring Boot 4.0.6 + Spring AI 2.0.0-M8
# ===================================================================
server:
  port: 8080

spring:
  application:
    name: ai-project-backend

  # Active profile (dev / test / prod)
  profiles:
    active: dev

  # ===================== JPA / Database ============================
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

  # ===================== Jackson ====================================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ===================== Spring AI ===================================
  ai:
    openai:
      api-key: ${AI_OPENAI_API_KEY:}
      chat:
        model: gpt-4o
        temperature: 0.7
        max-tokens: 2048

# ===================== MyBatis-Plus =================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ai.project.entity
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ===================== Logging =====================================
logging:
  level:
    root: INFO
    com.ai.project: DEBUG
    org.springframework.ai: INFO
    org.hibernate.SQL: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ===================== Actuator ====================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: AI Project Backend
    version: 1.0.0
    java-version: ${java.version}
