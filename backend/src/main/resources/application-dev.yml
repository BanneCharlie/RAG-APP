# ===================================================================
# 开发环境 — MySQL（存储）+ Redis（缓存）
# 需要本地安装 MySQL 8.0+ 和 Redis 7.0+
# 启动：mvn spring-boot:run
#
# 变量优先级（高 → 低）：
#   1. OS 环境变量 / IDEA EnvFile 插件加载的 .env
#   2. YAML 中 :xxx 指定的默认值（如下）
# ===================================================================
spring:
  ai:
    openai:
      api-key: ${AI_OPENAI_API_KEY:dev-placeholder-key}
      chat:
        options:
          temperature: 0.7
          max-tokens: 2048

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:rag_app}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  # MySQL 使用 schema.sql 建表
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

  # 关闭 JPA DDL（由 schema.sql 管理）
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

logging:
  level:
    com.ai.project: DEBUG
    org.springframework.ai: DEBUG
